<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WEATHER APP</title>
</head>
<body>
    <section>
        <div class="weather-box">
            <h1 class="titulo">Montreal</h1>
            <h2  class="temperatura">19°</h2>
            <h3 class="weather-desc">Mostly Clear</h3>
            <div class="weather-sub">
                <p>H:24°</p>
                <p>L:18°</p>
            </div>
        </div>
        <div class="house-box">
            <div class="house">
                <img src="./House.png" alt="House">
            </div> 
        </div>
        <div class="modal-box">
            <div class=modal></div>
        </div>
        <div class="tapBar">
            <div class="back"></div>
        </div>
    </section>
</body>
</html>
